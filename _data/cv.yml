        location: Beijing, China
        start_date: 2025-09-01
        end_date: present
        summary: Advancing VLA deployment in real mobile manipulation scenarios, optimizing whole-body control and mobile-manipulation coupling, incorporating World Model for long-horizon task modeling.
        highlights:
          - Deployed and operated Galaxea R1 Lite and Franka Emika Panda robots end-to-end
          - Integrated multimodal perception (vision, spatial structure, proprioception) for robust 3D perception
          - Designed 3D-printed robot components for rapid structural iteration

      - company: Beijing Academy of Artificial Intelligence (BAAI)
        position: Research Intern, Embodied Multimodal LLM Research Center
        location: Beijing, China
        start_date: 2024-08-01
        end_date: 2025-08-01
        summary: Contributed to open-source projects RoboBrain 1.0 & 2.0, co-proposed end-to-end VLA mobile manipulation framework AC-DiT achieving SOTA on multiple benchmarks.
        highlights:
          - Co-built RoboBrain 1.0 & 2.0, enhancing LLM/VLM spatial understanding and temporal modeling
          - Co-proposed AC-DiT end-to-end VLA framework, achieving SOTA on multiple benchmarks
          - Managed hardware debugging and real-robot data collection for Mobile ALOHA and composite mobile manipulators
          - Built mobile manipulation datasets and benchmarks across multiple simulators
          - Led construction of 100+ object and 10+ scene digital assets across simulators

    Research:
      - title: "AC-DiT: Adaptive Coordination Diffusion Transformer for Mobile Manipulation"
        description: "Co-first author. Proposed an end-to-end VLA framework for mobile manipulation with two-stage action generation (coarse prediction + diffusion refinement), achieving significantly better performance on multiple benchmarks and real-robot experiments."
        venue: NeurIPS 2025
        url: https://github.com/PKU-HMI-Lab/AC-DiT

      - title: "RoboMIND: Benchmark on Multi-embodiment Intelligence Normative Data for Robot Manipulation"
        description: "Contributed to proposing the RoboMIND multi-embodiment teleoperation dataset covering 107K demonstration trajectories, 479 tasks, 96 object categories, and 4 robot morphologies."
        venue: RSS 2025

      - title: "Chain of Thought Prompt Tuning in Vision Language Models"
        description: "Proposed Chain-of-Thought prompt tuning method, introducing CoT into VLMs by jointly leveraging visual and textual embedding information, significantly improving generalization and transfer in image classification, image-text retrieval, and VQA tasks."

      - title: "Implicit Neural Image Field for Biological Microscopy Image Compression"
        description: "Proposed an INR-based adaptive compression pipeline supporting arbitrary-shape images and pixel-level decompression, achieving up to 512x compression ratio on real biological microscopy images."
        venue: Nature Computational Science

    Open_Source:
      - name: "CAMEL: Communicative Agents for Mind Exploration of LLM Society"
        url: https://github.com/camel-ai/camel
        description: "Multi-agent research and application framework (15k+ GitHub stars). Designed embodied Agent tools and prompt schemes supporting Zero-shot and One-shot task execution, demonstrating superior performance over representative VLA models on RoboTwin Benchmark."

      - name: "AC-DiT: Adaptive Coordination Diffusion Transformer"
        url: https://github.com/PKU-HMI-Lab/AC-DiT
        description: "Official code for NeurIPS 2025 paper. Responsible for core module implementation including multimodal input processing, two-stage action generation, and simulation/real-robot evaluation."

      - name: "Awesome-World-Models"
        url: https://github.com/leofan90/Awesome-World-Models
        description: "World Model research survey and resource index (890+ GitHub stars). Maintained and expanded a curated collection covering video prediction, action-conditioned dynamics, embodied AI, and reinforcement learning."

